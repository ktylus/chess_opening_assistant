[tool.ruff]
line-length = 88
target-version = "py312"

[tool.ruff.lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes
    "I",      # isort
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "UP",     # pyupgrade
    "SIM",    # flake8-simplify
    "RET",    # flake8-return
    "N",      # pep8-naming
]

ignore = [
    "E501",   # line too long (handled by formatter)
    "B008",   # function calls in argument defaults (common with FastAPI Depends)
    "SIM108", # ternary instead of if-else (often less readable)
    "RET504", # unnecessary assignment before return (hurts debuggability)
    "N803",   # argument name should be lowercase (clashes with DataFrames, X, y)
    "N806",   # variable in function should be lowercase (same reason)
]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]  # allow unused imports for re-exports
"tests/*" = ["S101"]      # allow asserts in tests

[tool.ruff.lint.isort]
known-first-party = ["your_package_name"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
docstring-code-format = true